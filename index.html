<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026</title>
<style>
  :root { --wc-red: #C8102E; --wc-blue: #003DA5; --bg: #050c18; --text: #dce8ff; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; min-height: 100vh; }
  .hidden { display: none !important; }
  
  /* Menú */
  nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(0,0,0,0.5); border-bottom: 2px solid var(--wc-red); }
  .nav-tab { color: #fff; cursor: pointer; font-size: 14px; padding: 10px; }
  .nav-tab:hover { color: var(--wc-red); }

  /* Login */
  #page-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  #login-video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
  .login-box { width: 300px; padding: 30px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
  .input-group { margin-bottom: 15px; text-align: left; }
  input { width: 100%; padding: 12px; border-radius: 5px; border: none; background: #1a2538; color: white; }
  button { width: 100%; padding: 12px; background: var(--wc-red); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <img src="logo.png" alt="Logo" style="height: 40px; width: auto;">
  </div>
  <div style="display: flex; gap: 15px;">
    <div class="nav-tab" onclick="goTab('reglamento')">Reglamento</div>
    <div class="nav-tab" onclick="goTab('ranking')">Ranking</div>
    <div class="nav-tab" onclick="goTab('pronostico')">Pronóstico</div>
    <div class="nav-tab" onclick="goTab('partidos')">Partidos</div>
    <div id="admin-tab" class="nav-tab hidden" onclick="goTab('admin')">Admin</div>
  </div>
</nav>

<div id="page-login">
  <video id="login-video" autoplay muted loop playsinline preload="auto">
    <source src="MUNDIAL2026.mp4" type="video/mp4">
  </video>
  
  <div class="login-box">
    <div id="form-login">
      <div class="input-group"><label>Usuario</label><input type="text" id="login-user" placeholder="usuario"></div>
      <div class="input-group"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••"></div>
      <button onclick="doLogin()">Entrar</button>
      <div style="margin-top:15px; font-size:12px; color:#aaa; cursor:pointer" onclick="toggleForm()">Regístrate aquí</div>
    </div>
    <div id="form-register" class="hidden">
      <div class="input-group"><label>Nombre</label><input type="text" id="reg-name" placeholder="Tu nombre"></div>
      <div class="input-group"><label>Usuario</label><input type="text" id="reg-user" placeholder="usuario"></div>
      <div class="input-group"><label>Contraseña</label><input type="password" id="reg-pass" placeholder="contraseña"></div>
      <button onclick="doRegister()">Crear cuenta</button>
      <div style="margin-top:15px; font-size:12px; color:#aaa; cursor:pointer" onclick="toggleForm()">Ya tengo cuenta</div>
    </div>
  </div>
</div>

<div id="main-pages" class="hidden" style="padding: 20px;">
    <h1>Contenido del Mundial</h1>
</div>

<script>
// Lógica básica para que el login funcione y cambie de pantalla
function doLogin(){
    // Aquí puedes añadir tu lógica de validación real
    document.getElementById("page-login").classList.add("hidden");
    document.getElementById("main-pages").classList.remove("hidden");
}
function doRegister(){ alert("Registrado! Ahora entra."); toggleForm(); }
function toggleForm(){
    document.getElementById("form-login").classList.toggle("hidden");
    document.getElementById("form-register").classList.toggle("hidden");
}
function goTab(tab){ alert("Cargando sección: " + tab); }
</script>
</body>
</html>
